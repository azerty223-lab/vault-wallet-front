<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 760" role="img" aria-label="">
  <defs>
    <clipPath id="globeClip">
      <circle cx="380" cy="380" r="312" />
    </clipPath>
    <linearGradient id="blueGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0716ff" />
      <stop offset="58%" stop-color="#1f6dff" />
      <stop offset="100%" stop-color="#37ff92" />
    </linearGradient>
    <linearGradient id="cardFace" x1="15%" y1="0%" x2="85%" y2="100%">
      <stop offset="0%" stop-color="#43f785" />
      <stop offset="58%" stop-color="#287bff" />
      <stop offset="100%" stop-color="#0017ff" />
    </linearGradient>
    <linearGradient id="coinEdge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0017ff" />
      <stop offset="45%" stop-color="#42f98c" />
      <stop offset="100%" stop-color="#2c74ff" />
    </linearGradient>
  </defs>
  <style>
    .globe-core {
      animation: globe-drift 16s ease-in-out infinite;
      transform-box: fill-box;
      transform-origin: center;
    }

    .motion {
      animation-duration: 16s;
      animation-iteration-count: infinite;
      animation-timing-function: cubic-bezier(.45, 0, .2, 1);
      transform-box: fill-box;
      transform-origin: center;
    }

    .motion--coin-top {
      animation-name: coin-top-orbit;
    }

    .motion--coin-bottom {
      animation-name: coin-bottom-orbit;
    }

    .motion--card {
      animation-name: card-orbit;
    }

    .motion--gem {
      animation-name: gem-orbit;
    }

    .motion--mini-cube {
      animation-name: mini-cube-orbit;
    }

    .motion--mini-shield {
      animation-name: mini-shield-orbit;
    }

    @keyframes globe-drift {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      25% { transform: translate(14px, -9px) rotate(-2deg); }
      50% { transform: translate(5px, 13px) rotate(1deg); }
      75% { transform: translate(-12px, 4px) rotate(2deg); }
    }

    @keyframes coin-top-orbit {
      0% { opacity: 1; transform: translate(132px, -245px) scale(1.18) rotate(12deg); }
      16% { opacity: 1; transform: translate(-18px, -50px) scale(.92) rotate(-12deg); }
      34% { opacity: 1; transform: translate(-76px, 206px) scale(.72) rotate(-38deg); }
      52% { opacity: .9; transform: translate(150px, 286px) scale(.78) rotate(-78deg); }
      74% { opacity: 1; transform: translate(238px, 12px) scale(1.02) rotate(-124deg); }
      100% { opacity: 1; transform: translate(132px, -245px) scale(1.18) rotate(-348deg); }
    }

    @keyframes coin-bottom-orbit {
      0% { opacity: 1; transform: translate(-28px, 28px) scale(1) rotate(0deg); }
      20% { opacity: .9; transform: translate(155px, -252px) scale(.74) rotate(58deg); }
      42% { opacity: 1; transform: translate(264px, -62px) scale(.94) rotate(144deg); }
      62% { opacity: .92; transform: translate(118px, 108px) scale(.66) rotate(221deg); }
      82% { opacity: 1; transform: translate(-90px, -78px) scale(.82) rotate(300deg); }
      100% { opacity: 1; transform: translate(-28px, 28px) scale(1) rotate(360deg); }
    }

    @keyframes card-orbit {
      0% { opacity: 1; transform: translate(18px, -36px) scale(1) rotate(0deg); }
      18% { opacity: .9; transform: translate(340px, -88px) scale(.62) rotate(-22deg); }
      38% { opacity: 1; transform: translate(418px, -318px) scale(.86) rotate(-48deg); }
      58% { opacity: 1; transform: translate(182px, -446px) scale(.72) rotate(-68deg); }
      78% { opacity: .92; transform: translate(-78px, -240px) scale(.84) rotate(-28deg); }
      100% { opacity: 1; transform: translate(18px, -36px) scale(1) rotate(0deg); }
    }

    @keyframes gem-orbit {
      0% { opacity: 1; transform: translate(-12px, 0) scale(1) rotate(0deg); }
      24% { opacity: 1; transform: translate(-208px, -276px) scale(.55) rotate(90deg); }
      48% { opacity: .94; transform: translate(-392px, -116px) scale(.72) rotate(172deg); }
      70% { opacity: 1; transform: translate(-228px, 74px) scale(.48) rotate(248deg); }
      100% { opacity: 1; transform: translate(-12px, 0) scale(1) rotate(360deg); }
    }

    @keyframes mini-cube-orbit {
      0% { opacity: 0; transform: translate(0, 0) scale(.3) rotate(0deg); }
      10% { opacity: 1; transform: translate(-92px, 58px) scale(.48) rotate(22deg); }
      34% { opacity: 1; transform: translate(126px, 244px) scale(.36) rotate(92deg); }
      58% { opacity: .9; transform: translate(304px, 84px) scale(.46) rotate(154deg); }
      82% { opacity: 1; transform: translate(84px, -136px) scale(.4) rotate(236deg); }
      100% { opacity: 0; transform: translate(0, 0) scale(.3) rotate(360deg); }
    }

    @keyframes mini-shield-orbit {
      0% { opacity: .95; transform: translate(170px, -112px) scale(.5) rotate(0deg); }
      28% { opacity: 1; transform: translate(28px, 220px) scale(.4) rotate(-70deg); }
      54% { opacity: .9; transform: translate(-260px, 158px) scale(.52) rotate(-168deg); }
      78% { opacity: 1; transform: translate(-90px, -176px) scale(.36) rotate(-252deg); }
      100% { opacity: .95; transform: translate(170px, -112px) scale(.5) rotate(-360deg); }
    }

    @media (prefers-reduced-motion: reduce) {
      .globe-core,
      .motion {
        animation: none;
      }
    }
  </style>

  <g class="globe-core" transform="translate(-250 188)">
    <circle cx="380" cy="380" r="314" fill="#171a1b" stroke="#37fb86" stroke-width="3" />
    <g clip-path="url(#globeClip)">
      <path fill="#1d51ff" stroke="#0017ff" stroke-width="4" d="M98 116c72-60 171-88 291-83 122 5 223 50 305 134l-28 49-80 8-41 63 34 58-40 98-93 11-69-31-63 42-81 2-57-65-96 16-55-73 49-82-29-67 53-80z" />
      <path fill="#1d51ff" stroke="#0017ff" stroke-width="4" d="M58 503l124-32 91 54 41 119-71 87-168-44-58-110 41-74z" />
      <path fill="#1d51ff" stroke="#0017ff" stroke-width="4" d="M410 56l127 36 39 74-51 78-126-17-42-77 53-94z" />
      <path fill="url(#blueGlow)" opacity=".96" d="M185 79c70 7 130 37 179 91 44 49 86 86 127 113 37 24 85 41 143 49l14 41c-91 6-171-13-241-56-69-43-120-93-152-151-24-43-47-72-70-87z" />
      <path fill="url(#blueGlow)" opacity=".96" d="M91 347c90-17 180-13 270 13 91 26 180 71 268 137l-43 70c-92-66-179-111-260-136-82-25-166-28-252-10l17-74z" />
      <path fill="none" stroke="#40f487" stroke-width="3" opacity=".9" d="M69 281c94-37 207-51 337-42 124 9 230 39 319 89M62 483c94-34 197-48 309-41 111 7 216 35 315 85M151 65c107 121 170 234 190 340 20 107-8 207-84 300M499 63c-34 143-82 263-144 359-63 97-146 180-251 250M17 375c107-54 206-111 297-171 91-60 173-125 246-193" />
    </g>
  </g>

  <g class="motion motion--coin-top">
    <g transform="translate(372 300) rotate(-21) skewY(9)">
      <ellipse cx="61" cy="82" rx="61" ry="82" fill="url(#coinEdge)" stroke="#0017ff" stroke-width="2" />
      <ellipse cx="61" cy="82" rx="40" ry="56" fill="#fff" stroke="#0017ff" stroke-width="2" />
      <ellipse cx="50" cy="82" rx="45" ry="74" fill="none" stroke="#0017ff" stroke-width="14" opacity=".88" />
    </g>
  </g>

  <g class="motion motion--coin-bottom">
    <g transform="translate(267 475) rotate(-38) skewX(-10)">
      <circle cx="46" cy="46" r="45" fill="#3ff583" stroke="#0017ff" stroke-width="2" />
      <path fill="#15191a" d="M46 1a45 45 0 0 1 31 77L46 46Z" />
      <circle cx="46" cy="46" r="36" fill="none" stroke="#0017ff" stroke-width="8" />
    </g>
  </g>

  <g class="motion motion--card">
    <g transform="translate(-8 570) rotate(23) skewY(-8)">
      <path fill="url(#cardFace)" stroke="#0017ff" stroke-width="2" d="M16 0h96a16 16 0 0 1 16 16v150a16 16 0 0 1-16 16H16A16 16 0 0 1 0 166V16A16 16 0 0 1 16 0Z" />
      <path fill="#fff" stroke="#0017ff" stroke-width="2" d="M43-14h83v32H43z" />
      <path fill="url(#blueGlow)" stroke="#0017ff" stroke-width="2" d="M126 15h52v148h-52z" transform="skewY(28)" />
    </g>
  </g>

  <g class="motion motion--gem">
    <g transform="translate(515 515) rotate(-22)">
      <path fill="#fff" stroke="#0017ff" stroke-width="2" d="M0 25 49 34l12 42-51-16Z" />
      <path fill="#0017ff" stroke="#0017ff" stroke-width="2" d="m9 31 49 11-7 50L12 76Z" />
      <path fill="#37f98c" stroke="#0017ff" stroke-width="2" d="m31 11 32-11-7 63-25-19Z" />
    </g>
  </g>

  <g class="motion motion--mini-cube">
    <g transform="translate(438 458) rotate(15)">
      <path fill="#37f98c" stroke="#0017ff" stroke-width="2" d="M0 12 36 0l35 19-38 14Z" />
      <path fill="#1d51ff" stroke="#0017ff" stroke-width="2" d="m0 12 33 21-2 38L0 49Z" />
      <path fill="#fff" stroke="#0017ff" stroke-width="2" d="m33 33 38-14-5 37-35 15Z" />
    </g>
  </g>

  <g class="motion motion--mini-shield">
    <g transform="translate(512 354) rotate(-18)">
      <path fill="#0017ff" stroke="#0017ff" stroke-width="2" d="M30 0 59 9v31c0 20-13 35-29 45C13 75 0 60 0 40V9Z" />
      <path fill="#43f489" d="M30 3 57 11v28c0 18-12 32-27 42Z" />
    </g>
  </g>
</svg>
